# Shadowrun 6e Ranged Weapons - Core Rulebook
# Add items from the rulebook; include full description for each.

- name: Ares Predator VI
  subtype: Pistols (Heavy)
  cost: 750
  availability: "2(L)"
  dv: "3P"
  ar: "10/10/8/—/—"
  fire_modes: "SA/BF"
  ammo: "15(c)"
  accessories: []
  source: "Core Rulebook"
  description: "The Predator V rode on the laurels of its name. The Predator VI is genuine innovation built into some classic styling. Built on the framing of the original Predator, the VI comes with the standard smartgun operations but adds Burst Fire capability and a new variable ammunition system that will make it king of the streets and warzones once again, even if it comes with a price tag to match that innovation. The variable ammunition system allows a single specially designed magazine (30¥ per spare) to be loaded with different ammo types. The smartgun is used to select ammo types and cycles them to the chamber in whatever quantity is necessary and available."

- name: Colt America L36
  subtype: Pistols (Light)
  cost: 230
  availability: "2(L)"
  dv: "2P"
  ar: "8/8/6/—/—"
  fire_modes: "SA"
  ammo: "11(c)"
  accessories: []
  source: "Core Rulebook"
  description: "A tribute to Colt's world-class reputation, the L36 is cheap, easily concealed, and abundant on the streets. In order to be easily transferred between corporate security rookies, the weapon features an ownership swap feature that has been abused by cops and crooks alike. A perfect throwaway weapon. Wireless Bonus: The user can alter ownership data with a Minor Action."

- name: Fichetti Tiffani Needler
  subtype: Hold-Outs
  cost: 435
  availability: "2"
  dv: "3P"
  ar: "10/6/2/—/—"
  fire_modes: "SS"
  ammo: "4(c)"
  accessories: []
  source: "Core Rulebook"
  description: "Pretty and deadly are not mutually exclusive. Fichetti gunsmithing combined with Tiffani style makes the Needler the single most popular designer handgun in the world. The base model is matte grey, but its special color-changing coating can be manipulated via wireless signal with an infinite number of patterns and designs. Wireless bonus: You can change the color with a Minor Action. Applying a camouflage pattern increases the concealability threshold by 1 for visual Perception tests."

