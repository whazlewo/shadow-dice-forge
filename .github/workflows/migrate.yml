name: Migrate
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "supabase/migrations/**"
jobs:
  migrate:
    runs-on: ubuntu-latest
    if: github.repository == 'whazlewo/shadow-dice-forge'
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
      - name: Push migrations
        run: supabase db push --db-url "${{ secrets.SUPABASE_DB_URL }}" --yes
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
