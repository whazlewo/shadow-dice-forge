  source: "Core Rulebook"
  description: "A classic. When you think of hurting people with magic, the first thing that comes to mind is making fire explode in their faces. These are the spells that'll get that done. Flamestrike hits individuals, Fireball is area effect. Both spells do Fire elemental damage (p. 110) and impose the Burning status (p. 51) with a rating equal to net hits on the Spellcasting test."

