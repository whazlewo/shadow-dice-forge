  source: "Core Rulebook"
  description: "It's what deities from Zeus to Thor use to smite those who have it coming, which means it should be good enough for you, too. Lightning Bolt hits a single target with electricity, while Lightning Ball is area effect. Both spells do Electricity elemental damage (p. 109), imposing the Zapped status (p. 53) for a number of turns equal to net hits."

