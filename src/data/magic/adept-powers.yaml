# Shadowrun 6e Adept Powers - Core Rulebook
# pp_cost can be 0.25, 0.5, 1, 1.5, etc.

- name: Adrenaline Boost
  pp_cost: 0.25
  effects: "+2 Initiative per level for (Magic) combat rounds. Drain at end."
  dice_modifiers: [{ attribute: "initiative", value: 2, source: "Adrenaline Boost" }]
  source: "Core Rulebook"
  description: "You get a surge of energy so you can get the jump on others. For each level of the power, add 2 to your initiative score for (Magic) combat rounds. At the end of those combat rounds, experience drain equal to the level of the power, which you can resist as normal. Activation: Minor Action."

- name: Combat Sense
  pp_cost: 0.5
  effects: "+1 dice to defense tests per level. Perception test before surprise."
  dice_modifiers: [{ attribute: "defense_dice", value: 1, source: "Combat Sense" }]
  source: "Core Rulebook"
  description: "This power gives you the ability to anticipate and avoid harm. Gain a +1 dice pool bonus per level on any defensive tests. You always have a chance to make a Perception test to avoid surprise. Activation: Passive."

- name: Critical Strike
  pp_cost: 1
  effects: "+1 DV with unarmed or melee attacks per level."
  dice_modifiers: []
  source: "Core Rulebook"
  description: "Increase the DV of your melee attacks by 1 per level of this power. This power is compatible with other enhancements from weapons and adept powers unless otherwise prohibited. Activation: Passive."

- name: Danger Sense
  pp_cost: 0.5
  effects: "Gain Edge before Surprise tests."
  dice_modifiers: []
  source: "Core Rulebook"
  description: "You have a sixth sense for danger, instinctively knowing when it's nearby and preparing for it. Gain an Edge before making Surprise tests. Activation: Passive."

- name: Direction Sense
  pp_cost: 0.25
  effects: "Gain Edge on Outdoors tests related to directions."
  dice_modifiers: []
  source: "Core Rulebook"
  description: "You have a good sense of where you have been, where you're going, and a few of the obstacles in between. When making an Outdoors test related to directions, you may gain an Edge point, provided you spend it immediately on that test. Activation: Passive."

- name: Enhanced Accuracy
  pp_cost: 0.5
  effects: "+2 Attack Rating with any weapon."
  dice_modifiers: []
  source: "Core Rulebook"
  description: "Weapons are more accurate and deadly in your hands than in those of normal people. Increase the Attack Rating of any weapon you wield by 2. Activation: Passive."

- name: Enhanced Perception
  pp_cost: 0.5
  effects: "Gain Edge when Observing in Detail or Perception to find hidden/listen."
  dice_modifiers: []
  source: "Core Rulebook"
  description: "Your senses are keenly honed, giving you information in enough time for you to figure out what to do about it. Gain an Edge when Observing in Detail or making a Perception test to find something hidden or listen to something you're not supposed to hear. Activation: Passive."

- name: Improved Ability (Skill)
  pp_cost: 0.5
  effects: "Skill boost. Combat: 1 PP/level; other skills: 0.5 PP/level. Max 1.5x level."
  dice_modifiers: []
  source: "Core Rulebook"
  description: "A skill must be selected when this power is chosen. That skill receives an ongoing boost equal to the rating of the power. The maximum boost to the skill is 1.5 times the current level (rounded up) or the augmented maximum, whichever is lower. You need to have at least one rank in a skill to buy this power for it, and the power can be purchased for multiple skills. Cost: Combat skill 1.0 PP per level; other skills 0.5 PP per level. Activation: Passive."

- name: Improved Physical Attribute (Agility)
  pp_cost: 1
  effects: "+1 Agility. Can take for different attributes."
  dice_modifiers: [{ attribute: "agility", value: 1, source: "Improved Physical Attribute" }]
  source: "Core Rulebook"
  description: "Select a Physical attribute (Body, Agility, Reaction, or Strength) when purchasing this power. That attribute receives an ongoing boost equal to the level of this power. The maximum boost to the attribute is 1.5 times the current level or the augmented maximum, whichever is lower. Activation: Passive."

- name: Improved Physical Attribute (Strength)
  pp_cost: 1
  effects: "+1 Strength."
  dice_modifiers: [{ attribute: "strength", value: 1, source: "Improved Physical Attribute" }]
  source: "Core Rulebook"
  description: "Select a Physical attribute (Body, Agility, Reaction, or Strength) when purchasing this power. That attribute receives an ongoing boost equal to the level of this power. The maximum boost to the attribute is 1.5 times the current level or the augmented maximum, whichever is lower. Activation: Passive."

