- name: Improved Reflexes (1)
  pp_cost: 1.5
  effects: "+1 Reaction, +1d6 Initiative. Max level 4."
  dice_modifiers:
    - { attribute: "reaction", value: 1, source: "Improved Reflexes" }
    - { attribute: "initiative_dice", value: 1, source: "Improved Reflexes" }
  exclusion_group: initiative_boost
  source: "Core Rulebook"
  description: "This power gives you quick reflexes and anticipation, allowing you to act and react much faster than the normies. For each level of this power, add an Initiative Die and increase your Reaction by 1. The maximum level of this power is 4, and it cannot be combined with any other Initiative or Reaction boosts. Activation: Passive."

