- name: Improved Sense
  pp_cost: 0.25
  effects: "Select a sense. Gain Edge on tests involving that sense."
  dice_modifiers: []
  source: "Core Rulebook"
  description: "When this power is purchased, select a sense (sight, hearing, touch, taste, or smell). When making a test involving that sense, you get a bonus Edge, but only if you use it (either alone or in combination with other Edge points) on that test. Edge points from this power cannot be gained more than once when the same sense (noise, sight, flavor, etc.) is involved. This power can be selected more than once, each time for a different sense. Activation: Passive."

- name: Killing Hands
  pp_cost: 0.5
  effects: "Unarmed attacks: choose Stun or Physical. Magical, bypass normal weapon protections."
  dice_modifiers: []
  source: "Core Rulebook"
  description: "Your hands become lethal and magical, useful both in shadowrunning and cheesy pickup lines. When fighting unarmed, you can choose to deal Stun or Physical damage. Killing Hands can be combined with other powers affecting unarmed combat. Attacks made with Killing Hands are considered magical, meaning they bypass protections against normal weapons and can be made against astral beings. Activation: Minor Action."

- name: Kinesics
  pp_cost: 0.25
  effects: "Gain Edge when resisting Social tests to read emotions/intentions."
  dice_modifiers: []
  source: "Core Rulebook"
  description: "Your command of body language and nonverbal communication is, well, magical, and it helps you be incredibly difficult to read. When you are resisting Social tests and tests to read your emotions, judge your intentions, or gauge your truthfulness, you gain an Edge point. Only one such Edge point may be gained per encounter. Activation: Passive."

- name: Mystic Armor
  pp_cost: 0.25
  effects: "+1 Armor per level. Cumulative with worn Armor. Active on astral plane."
  dice_modifiers: [{ attribute: "defense_rating", value: 1, source: "Mystic Armor" }]
  source: "Core Rulebook"
  description: "Mana forms a shield around you, enhancing your protection. Gain 1 point of Armor for each level of this power, cumulative with worn Armor, which also increases your Defense Rating. Mystic Armor is also active on the astral plane. Activation: Passive."

- name: Pain Resistance
  pp_cost: 0.25
  effects: "Damage modifiers move 1 box farther down Condition Monitor per level."
  dice_modifiers: []
  source: "Core Rulebook"
  description: "Pain hurts, but you gain an elevated ability to ignore it. For each level of this power, the negative modifiers from damage move one box farther down the Condition Monitor—for example, at level 1, you don't suffer the –1 penalty until 4 boxes are filled on a Condition Monitor, rather than 3. It works for both Stun and Physical Condition Monitors. Activation: Passive."

- name: Rapid Healing
  pp_cost: 0.5
  effects: "+1 hit per level on Healing tests performed to heal you."
  dice_modifiers: []
  source: "Core Rulebook"
  description: "The magic that flows through you helps knit your bones and regrow your flesh, making you heal quickly. Add one hit per level on Healing tests performed to heal you. Activation: Passive."

- name: Spell Resistance
  pp_cost: 0.5
  effects: "Gain Edge when targeted by spells. Flat 0.5 PP cost (not per level)."
  dice_modifiers: []
  source: "Core Rulebook"
  description: "Spells have a tendency to bounce off you rather than affect you. Gain a point of Edge when targeted by spells. Cost is 0.5 PP flat (errata Aug 2019: was 0.5 PP per level). Activation: Passive."

- name: Traceless Walk
  pp_cost: 0.5
  effects: "No tracks. Don't trigger tripwires, pressure pads. Hearing/Outdoors tests can't gain or spend Edge."
  dice_modifiers: []
  source: "Core Rulebook"
  description: "You don't disturb the dust, dirt, snow, water, or anything else under your feet as you move, so there is no evidence of your passing. You don't trigger tripwires, pressure pads, or other traps based on leg movement. Hearing tests to listen for your passage and Outdoors tests to perceive your tracks cannot gain or spend Edge. Activation: Passive."

- name: Vocal Control
  pp_cost: 0.5
  effects: "Gain Edge on Con or Influence tests involving your voice."
  dice_modifiers: []
  source: "Core Rulebook"
  description: "You can control the pitch and modulation of your voice to make it sound the way you want—loud, quiet, resonant, or like some person you want to imitate. Gain Edge when attempting a Con or Influence test that somehow involves your voice. Only one point of Edge may be earned per encounter with this power. Activation: Passive."

- name: Wall Running
  pp_cost: 0.5
  effects: "Sprint up vertical surfaces. Cannot use two turns in a row."
  dice_modifiers: []
  source: "Core Rulebook"
  description: "Running horizontally is so pedestrian (get it?). Running up a wall is how you show you're special. When using this power, you can use a Sprint action (see p. 44) to run up a vertical surface. You cannot use this power for two actions in a row; you have to spend at least one turn moving across a horizontal surface before using this power again. So if you run up a wall and don't find a good foot or handhold, you'll be falling right back down. Activation: Minor Action."
